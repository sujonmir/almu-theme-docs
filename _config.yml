title: Almu Theme Documentation
description: Official documentation for the Almu Shopify theme — installation, customization, sections, and FAQ.
remote_theme: just-the-docs/just-the-docs
url: https://sujonmir.github.io
baseurl: /almu-theme-docs
permalink: pretty

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: true

# Nav
heading_anchors: true
nav_sort: case_insensitive

aux_links:
  "Email support":
    - "mailto:sujonmhk786@gmail.com?subject=Almu%20%7C%20Support%20request"
  "View on GitHub":
    - "https://github.com/sujonmir/almu-theme-docs"

footer_content: 'Copyright &copy; 2026 Sujon Mir. Almu is a commercial Shopify theme. <a href="mailto:sujonmhk786@gmail.com?subject=Almu%20%7C%20">Support</a>.'

# Color scheme
color_scheme: light

# Code formatting
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Plugins (GitHub Pages whitelist)
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
